<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>חדר חזרות · Ai-Z</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#e3132c; --red-deep:#9d0b1c; --gold:#ffd9a8; --muted:#b9a7ac;
    --green:#34c759; --yellow:#ffcc33; --rose:#ff4d6a; --line:rgba(255,255,255,.12);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:Heebo,system-ui,Arial,sans-serif; color:#fff; background:
      radial-gradient(120% 80% at 80% -10%, #3a0c16 0%, transparent 60%),
      radial-gradient(120% 90% at -10% 110%, #45000c 0%, transparent 55%),
      linear-gradient(160deg,#1a0a0e,#0c0507 70%);
    min-height:100dvh; display:flex; flex-direction:column;
  }
  header{display:flex; align-items:center; gap:10px; padding:9px 14px; border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:30; backdrop-filter:blur(8px); background:rgba(15,7,9,.62)}
  .brand{font-weight:900; letter-spacing:.5px; font-size:17px; white-space:nowrap}
  .brand b{color:var(--red)}
  .spacer{flex:1}
  .timer{font-variant-numeric:tabular-nums; font-weight:700; font-size:15px; padding:6px 11px;
    border:1px solid var(--line); border-radius:999px; cursor:pointer; user-select:none; white-space:nowrap}
  .timer small{color:var(--muted); font-weight:500}
  .iconbtn{border:1px solid var(--line); background:transparent; color:#fff; border-radius:10px;
    min-width:38px; height:36px; font-size:15px; cursor:pointer; padding:0 9px}
  .iconbtn:hover{background:rgba(255,255,255,.07)}

  /* section bar */
  .secbar{display:flex; gap:4px; padding:8px 14px 0; max-width:1180px; margin:0 auto; width:100%}
  .seg{flex:1; height:6px; border-radius:4px; background:rgba(255,255,255,.13); cursor:pointer; position:relative}
  .seg.done{background:rgba(255,255,255,.3)}
  .seg.cur{background:linear-gradient(90deg,var(--red),var(--red-deep))}
  .seclabel{max-width:1180px; margin:7px auto 0; padding:0 14px; width:100%; display:flex; align-items:center; gap:8px;
    font-size:13px; color:var(--muted)}
  .move-chip{font-size:11px; font-weight:900; letter-spacing:1px; color:#fff; background:rgba(227,19,44,.25);
    border:1px solid rgba(227,19,44,.5); padding:2px 8px; border-radius:6px}
  .seclabel b{color:#fff; font-weight:700}

  main{flex:1; width:100%; max-width:1180px; margin:0 auto; padding:10px 14px 120px}
  .stage{display:grid; grid-template-columns:1.05fr 1fr; gap:18px; align-items:start}
  @media(max-width:880px){ .stage{grid-template-columns:1fr} }

  .slidewrap{position:relative; border-radius:16px; overflow:hidden; border:1px solid var(--line);
    background:#000; box-shadow:0 18px 50px rgba(0,0,0,.45)}
  .slidewrap img{display:block; width:100%; aspect-ratio:16/9; object-fit:contain; background:#0c0507}
  .slidetag{position:absolute; inset-block-start:10px; inset-inline-start:10px; font-size:12px;
    background:rgba(0,0,0,.55); border:1px solid var(--line); padding:4px 10px; border-radius:999px}
  .cueline{margin-top:10px; font-size:14px; color:var(--gold); font-weight:500; min-height:20px}

  .panel{background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
    border:1px solid var(--line); border-radius:16px; padding:14px 14px 16px}
  .turn{display:flex; gap:9px; align-items:flex-start; margin-bottom:12px; padding:9px 12px; border-radius:11px;
    background:linear-gradient(90deg,rgba(255,217,168,.16),rgba(255,217,168,.04)); border:1px solid rgba(255,217,168,.4);
    color:var(--gold); font-size:13.5px; font-weight:500; line-height:1.5}
  .turn b{font-size:15px}
  .levels{display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap}
  .lvl{flex:1; min-width:64px; text-align:center; padding:8px 6px; border:1px solid var(--line);
    border-radius:10px; cursor:pointer; font-size:13px; font-weight:500; color:var(--muted); background:transparent; transition:.15s}
  .lvl small{display:block; font-size:10px; opacity:.7; font-weight:400}
  .lvl.active{color:#fff; border-color:var(--red); background:linear-gradient(180deg,rgba(227,19,44,.25),rgba(227,19,44,.08))}

  .beats{display:flex; flex-direction:column; gap:9px}
  .beat{position:relative; padding:11px 13px; border-radius:12px; cursor:pointer; line-height:1.65;
    font-size:17px; border:1px solid var(--line); background:rgba(255,255,255,.025); transition:.12s}
  .beat:hover{border-color:rgba(255,255,255,.28)}
  .beat .blur{filter:blur(6px); opacity:.55}
  .beat.revealed .blur{filter:none; opacity:1}
  .beat .initials{color:var(--gold); letter-spacing:3px; font-weight:700; font-size:18px}
  .beat .hidden-hint{color:var(--muted); font-style:italic; font-size:15px}
  .beat .num{position:absolute; inset-inline-start:-9px; inset-block-start:-9px; width:22px; height:22px;
    border-radius:50%; background:var(--red); color:#fff; font-size:12px; font-weight:700;
    display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,.4)}

  .panel-actions{display:flex; gap:8px; margin-top:13px; flex-wrap:wrap}
  .btn{flex:1; min-width:110px; padding:10px; border-radius:10px; border:1px solid var(--line);
    background:transparent; color:#fff; cursor:pointer; font-size:14px; font-weight:500}
  .btn:hover{background:rgba(255,255,255,.06)}
  .btn.tts.on{border-color:var(--gold); color:var(--gold)}

  .rate{margin-top:13px}
  .rate p{margin:0 0 7px; font-size:13px; color:var(--muted)}
  .rate-row{display:flex; gap:8px}
  .rate-row button{flex:1; padding:9px; border-radius:10px; border:1px solid var(--line);
    background:transparent; color:#fff; cursor:pointer; font-size:14px; font-weight:600}
  .rate-row button[data-r=green].sel{background:rgba(52,199,89,.2); border-color:var(--green)}
  .rate-row button[data-r=yellow].sel{background:rgba(255,204,51,.2); border-color:var(--yellow)}
  .rate-row button[data-r=red].sel{background:rgba(255,77,106,.2); border-color:var(--rose)}

  .nav{position:fixed; inset-block-end:0; inset-inline:0; z-index:30; padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,transparent,rgba(8,4,5,.92) 30%); display:flex; justify-content:center}
  .nav-inner{width:100%; max-width:1180px; display:flex; align-items:center; gap:10px}
  .navbtn{padding:13px 16px; border-radius:12px; border:1px solid var(--line); background:rgba(30,16,20,.9);
    color:#fff; cursor:pointer; font-size:15px; font-weight:600; white-space:nowrap}
  .navbtn.primary{background:linear-gradient(180deg,var(--red),var(--red-deep)); border-color:transparent}
  .navbtn:disabled{opacity:.35; cursor:default}
  .progress{flex:1; display:flex; flex-direction:column; gap:6px; align-items:center}
  .dots{display:flex; gap:4px; flex-wrap:wrap; justify-content:center; max-width:560px}
  .dot{width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,.2); cursor:pointer}
  .dot.green{background:var(--green)} .dot.yellow{background:var(--yellow)} .dot.red{background:var(--rose)}
  .dot.cur{outline:2px solid #fff; outline-offset:2px}
  .pos{font-size:13px; color:var(--muted); font-variant-numeric:tabular-nums}
  .pos b{color:#fff}

  .overlay{position:fixed; inset:0; z-index:50; background:rgba(8,4,5,.97); overflow:auto; display:none; padding:18px}
  .overlay.show{display:block}
  .overlay h2{margin:6px 4px 14px; display:flex; align-items:center; gap:10px}
  .closex{margin-inline-start:auto; cursor:pointer}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; max-width:1180px; margin:0 auto}
  .gsec{grid-column:1/-1; margin:10px 2px 0; font-size:13px; color:var(--gold); font-weight:700;
    border-top:1px solid var(--line); padding-top:10px}
  .gsec span{color:var(--muted); font-weight:400}
  .card{border:1px solid var(--line); border-radius:12px; overflow:hidden; cursor:pointer; background:#140a0d; position:relative}
  .card img{width:100%; aspect-ratio:16/9; object-fit:contain; background:#0c0507}
  .card .cap{padding:7px 9px; font-size:12px; color:#eadfe1; line-height:1.4}
  .card .pill{position:absolute; inset-block-start:6px; inset-inline-start:6px; width:18px; height:18px; border-radius:50%;
    font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,.6)}
  .card .rdot{position:absolute; inset-block-start:6px; inset-inline-end:6px; width:11px; height:11px; border-radius:50%; background:rgba(255,255,255,.25)}
  .card .rdot.green{background:var(--green)} .card .rdot.yellow{background:var(--yellow)} .card .rdot.red{background:var(--rose)}

  /* quiz */
  .qwrap{max-width:680px; margin:0 auto}
  .qmeta{display:flex; justify-content:space-between; align-items:center; color:var(--muted); font-size:13px; margin-bottom:10px}
  .qcard{border:1px solid var(--line); border-radius:16px; padding:20px; background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02))}
  .qsec{font-size:12px; color:var(--gold); font-weight:700; margin-bottom:8px}
  .qq{font-size:21px; font-weight:700; line-height:1.5; margin-bottom:14px}
  .qa{font-size:16px; line-height:1.7; color:#f1e7e9; border-top:1px dashed var(--line); padding-top:14px; display:none}
  .qa.show{display:block}
  .qactions{display:flex; gap:8px; margin-top:18px; flex-wrap:wrap}
  .qscore{text-align:center; margin-top:18px; font-size:15px; color:var(--muted)}
  .qscore b{color:#fff; font-size:34px; display:block; font-variant-numeric:tabular-nums}

  .toast{position:fixed; inset-block-end:96px; inset-inline:0; display:flex; justify-content:center; z-index:60; pointer-events:none}
  .toast span{background:rgba(20,10,13,.95); border:1px solid var(--line); padding:9px 16px; border-radius:999px; font-size:14px; opacity:0; transition:.25s; transform:translateY(8px)}
  .toast.show span{opacity:1; transform:none}

  /* edit mode */
  .iconbtn.on{border-color:var(--gold); color:var(--gold)}
  .edbar{display:none; gap:8px; flex-wrap:wrap; margin-bottom:12px; padding:10px 11px; border-radius:11px;
    background:rgba(255,217,168,.08); border:1px dashed rgba(255,217,168,.45)}
  body.editing .edbar{display:flex}
  .edbar .note{flex:1 1 100%; font-size:12px; color:var(--gold); line-height:1.5}
  .edfield{display:none; margin-bottom:10px}
  body.editing .edfield{display:block}
  .edfield label{display:block; font-size:11px; color:var(--muted); margin-bottom:4px}
  textarea.ed{width:100%; background:rgba(255,255,255,.04); color:#fff; border:1px solid var(--line);
    border-radius:9px; padding:9px 11px; font:inherit; font-size:16px; line-height:1.6; resize:none; overflow:hidden; min-height:40px}
  textarea.ed:focus{outline:none; border-color:var(--gold)}
  .edrow{display:flex; gap:6px; align-items:flex-start; margin-bottom:8px}
  .edrow .del{flex:0 0 auto; width:34px; height:34px; border:1px solid var(--line); background:transparent;
    color:var(--rose); border-radius:8px; cursor:pointer; font-size:13px}
  .edrow .del:hover{background:rgba(255,77,106,.12)}
  body.editing .levels, body.editing .panel-actions, body.editing .rate, body.editing #turn{display:none}
</style>
</head>
<body>
<header>
  <div class="brand">חדר חזרות · <b>Ai-Z</b></div>
  <div class="spacer"></div>
  <div class="timer" id="timer" title="הקש להפעלה/עצירה · הקשה ארוכה לאיפוס">00:00 <small>/ 10:00</small></div>
  <button class="iconbtn" id="editBtn" title="עריכת טקסטים">✏️</button>
  <button class="iconbtn" id="quizBtn" title="מבחן ידע">📝 מבחן</button>
  <button class="iconbtn" id="mapBtn" title="מפת השקפים">▦</button>
  <button class="iconbtn" id="helpBtn" title="עזרה">?</button>
</header>

<div class="secbar" id="secbar"></div>
<div class="seclabel" id="seclabel"></div>

<main>
  <div class="stage">
    <div>
      <div class="slidewrap">
        <span class="slidetag" id="slidetag"></span>
        <img id="slideImg" alt="">
      </div>
      <div class="cueline" id="cueline"></div>
    </div>

    <div class="panel">
      <div class="turn" id="turn" style="display:none"></div>
      <div class="edbar" id="edbar">
        <div class="note">✏️ מצב עריכה — שני כל שורה כרצונך. השינויים נשמרים אוטומטית במכשיר הזה. אפשר לייצא גיבוי בכל רגע.</div>
        <button class="btn" id="edAddLine">➕ שורה</button>
        <button class="btn" id="edReset">↺ שחזר שקף זה</button>
        <button class="btn" id="edExport">⬇️ ייצוא טקסט</button>
      </div>
      <div class="edfield" id="edCueField"><label>כותרת-עוגן (לניווט):</label><textarea class="ed" id="edCue" rows="1"></textarea></div>
      <div class="edfield" id="edTurnField"><label>רצועת מעבר 🔗 (אופציונלי — רוקני כדי להסיר):</label><textarea class="ed" id="edTurn" rows="1"></textarea></div>
      <div class="levels" id="levels">
        <button class="lvl" data-l="1">מלא<small>קריאה</small></button>
        <button class="lvl" data-l="2">התחלות<small>רמז קל</small></button>
        <button class="lvl" data-l="3">ראשי תיבות<small>רמז חזק</small></button>
        <button class="lvl" data-l="4">בעל פה<small>מבחן</small></button>
      </div>
      <div class="beats" id="beats"></div>
      <div class="panel-actions">
        <button class="btn" id="revealAll">חשוף הכל</button>
        <button class="btn tts" id="ttsBtn">🔊 הקראה</button>
      </div>
      <div class="rate">
        <p>איך הרגשת על השקף הזה?</p>
        <div class="rate-row" id="rateRow">
          <button data-r="green">🟢 ידעתי</button>
          <button data-r="yellow">🟡 כמעט</button>
          <button data-r="red">🔴 שכחתי</button>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="nav">
  <div class="nav-inner">
    <button class="navbtn" id="prevBtn">→ הקודם</button>
    <div class="progress">
      <div class="dots" id="dots"></div>
      <div class="pos" id="pos"></div>
    </div>
    <button class="navbtn primary" id="nextBtn">הבא ←</button>
  </div>
</div>

<!-- overview map -->
<div class="overlay" id="overlay">
  <h2>מפת המסע <span style="color:var(--muted);font-weight:400;font-size:14px">— 3 תנועות · 7 סקשנים</span>
    <button class="iconbtn closex" id="closeMap">✕</button></h2>
  <div style="text-align:center;margin:-6px 0 14px"><button class="navbtn" id="drillBtn">🎯 תרגול נקודות תורפה</button></div>
  <div class="grid" id="grid"></div>
</div>

<!-- quiz -->
<div class="overlay" id="quiz">
  <h2>מבחן ידע <span style="color:var(--muted);font-weight:400;font-size:14px">— תוכיחי שאת שולטת בחומר</span>
    <button class="iconbtn closex" id="closeQuiz">✕</button></h2>
  <div class="qwrap">
    <div class="qmeta"><span id="qprog"></span>
      <span><button class="iconbtn" id="qshuffle" title="ערבוב">🔀</button>
            <button class="iconbtn" id="qrestart" title="התחל מחדש">↺</button></span></div>
    <div class="qcard">
      <div class="qsec" id="qsec"></div>
      <div class="qq" id="qq"></div>
      <div class="qa" id="qa"></div>
      <div class="qactions" id="qactions"></div>
    </div>
    <div class="qscore" id="qscore"></div>
  </div>
</div>

<div class="toast" id="toast"><span></span></div>

<script src="script.js"></script>
<script>
(function(){
  const $ = s => document.querySelector(s);
  const slides = SLIDES;
  let idx=0, level=1, order=slides.map((_,i)=>i), drill=false;
  const revealed=new Set();
  const ratings=JSON.parse(localStorage.getItem('aiz_ratings')||'{}');

  // ---------- editing (open text editor) ----------
  const ORIGINAL=(typeof structuredClone==='function')?structuredClone(SLIDES):JSON.parse(JSON.stringify(SLIDES));
  const edits=JSON.parse(localStorage.getItem('aiz_edits')||'{}');
  slides.forEach(s=>{ const e=edits[s.n]; if(e){ if(e.beats)s.beats=e.beats.slice(); if('cue'in e)s.cue=e.cue; if('turn'in e)s.turn=e.turn; }});
  let editing=false;
  function saveEdit(s){ edits[s.n]={beats:s.beats.slice(),cue:s.cue,turn:s.turn||''}; localStorage.setItem('aiz_edits',JSON.stringify(edits)); }
  function autoGrow(ta){ ta.style.height='auto'; ta.style.height=(ta.scrollHeight+2)+'px'; }
  function renderEditBeats(s){
    const box=$('#beats'); box.innerHTML='';
    s.beats.forEach((text,bi)=>{
      const row=document.createElement('div'); row.className='edrow';
      const ta=document.createElement('textarea'); ta.className='ed'; ta.rows=1; ta.value=text;
      ta.oninput=()=>{ s.beats[bi]=ta.value; autoGrow(ta); saveEdit(s); };
      const del=document.createElement('button'); del.className='del'; del.textContent='✕'; del.title='מחק שורה';
      del.onclick=()=>{ s.beats.splice(bi,1); saveEdit(s); render(); };
      row.append(ta,del); box.appendChild(row); autoGrow(ta);
    });
  }

  function firstLetter(w){ const m=w.match(/[A-Za-z֐-׿]/); return m?m[0]:(w[0]||''); }
  function toast(msg){ const t=$('#toast'); t.firstElementChild.textContent=msg; t.classList.add('show');
    clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1700); }

  // ---------- beats ----------
  function renderBeats(s){
    const box=$('#beats'); box.innerHTML='';
    s.beats.forEach((text,bi)=>{
      const el=document.createElement('div'); el.className='beat';
      const words=text.split(/\s+/); const open=revealed.has(bi); let inner='';
      if(level===1||open){ inner=text; if(open) el.classList.add('revealed'); }
      else if(level===2){ const k=Math.max(2,Math.ceil(words.length*0.34));
        inner=words.slice(0,k).join(' ')+(words.length>k?' <span class="blur">'+words.slice(k).join(' ')+'</span>':''); }
      else if(level===3){ inner='<span class="initials">'+words.map(firstLetter).join(' ')+'</span>'; }
      else { inner='<span class="hidden-hint">דברי בעל־פה… הקישי לחשיפה</span>'; }
      el.innerHTML='<span class="num">'+(bi+1)+'</span>'+inner;
      el.onclick=()=>{ revealed.has(bi)?revealed.delete(bi):revealed.add(bi); renderBeats(s); };
      box.appendChild(el);
    });
  }

  function render(){
    const s=slides[order[idx]];
    $('#slideImg').src=s.img;
    $('#slidetag').textContent='שקף '+s.n+(s.spoken?'':' · לא מדברת');
    $('#cueline').textContent='⟡ '+s.cue;
    // turn ribbon
    const tn=$('#turn');
    if(s.turn){ tn.style.display='flex'; tn.innerHTML='<b>🔗</b><span>'+s.turn+'</span>'; }
    else tn.style.display='none';
    if(editing){ $('#edCue').value=s.cue||''; autoGrow($('#edCue')); $('#edTurn').value=s.turn||''; autoGrow($('#edTurn')); renderEditBeats(s); }
    else { revealed.clear(); if(level===1) s.beats.forEach((_,i)=>revealed.add(i)); renderBeats(s); }
    document.querySelectorAll('.lvl').forEach(b=>b.classList.toggle('active',+b.dataset.l===level));
    document.querySelectorAll('#rateRow button').forEach(b=>b.classList.toggle('sel',ratings[s.n]===b.dataset.r));
    $('#prevBtn').disabled=idx===0; $('#nextBtn').disabled=idx===order.length-1;
    $('#nextBtn').textContent=idx===order.length-1?'סיום 🎉':'הבא ←';
    $('#pos').innerHTML=(drill?'תרגול תורפה · ':'')+'<b>'+(idx+1)+'</b> / '+order.length;
    renderSecbar(s); renderDots();
    stopTTS(); window.scrollTo({top:0,behavior:'smooth'});
  }

  function renderSecbar(s){
    const bar=$('#secbar'); bar.innerHTML='';
    for(let i=1;i<=7;i++){
      const seg=document.createElement('div');
      seg.className='seg'+(i<s.sec?' done':'')+(i===s.sec?' cur':'');
      seg.title=SECTIONS[i].move+' · '+SECTIONS[i].name;
      seg.onclick=()=>{ const t=order.findIndex(o=>slides[o].sec===i); if(t>=0){idx=t;render();} };
      bar.appendChild(seg);
    }
    const sc=SECTIONS[s.sec]||{move:'',name:''};
    $('#seclabel').innerHTML=(sc.move?'<span class="move-chip">'+sc.move+'</span>':'')+
      '<span>סקשן '+(s.sec||'–')+' מתוך 7 · <b>'+sc.name+'</b></span>';
  }

  function renderDots(){
    const d=$('#dots'); d.innerHTML='';
    order.forEach((si,i)=>{ const s=slides[si]; const dot=document.createElement('div');
      dot.className='dot '+(ratings[s.n]||'')+(i===idx?' cur':''); dot.title='שקף '+s.n;
      dot.onclick=()=>{idx=i;render();}; d.appendChild(dot); });
  }

  function next(){ if(idx<order.length-1){idx++;render();} else openQuizPrompt(); }
  function prev(){ if(idx>0){idx--;render();} }
  $('#nextBtn').onclick=next; $('#prevBtn').onclick=prev;
  function openQuizPrompt(){ toast('סיימת את כל השקפים! מוכנה למבחן? 📝'); }

  document.addEventListener('keydown',e=>{
    if(/^(textarea|input)$/i.test(e.target.tagName)) return;
    if($('#overlay').classList.contains('show')){ if(e.key==='Escape')closeMap(); return; }
    if($('#quiz').classList.contains('show')){ if(e.key==='Escape')closeQuiz(); return; }
    if(e.key==='ArrowLeft')next();
    else if(e.key==='ArrowRight')prev();
    else if(e.key===' '){ e.preventDefault(); const s=slides[order[idx]];
      const h=s.beats.findIndex((_,i)=>!revealed.has(i)); if(h>=0){revealed.add(h);renderBeats(s);} else next(); }
    else if(e.key>='1'&&e.key<='4') setLevel(+e.key);
  });
  let tx=0,ty=0;
  document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
  document.addEventListener('touchend',e=>{ const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)>70&&Math.abs(dx)>Math.abs(dy)) dx<0?next():prev(); },{passive:true});

  function setLevel(l){ level=l; const s=slides[order[idx]]; revealed.clear();
    if(level===1) s.beats.forEach((_,i)=>revealed.add(i)); renderBeats(s);
    document.querySelectorAll('.lvl').forEach(b=>b.classList.toggle('active',+b.dataset.l===level)); }
  document.querySelectorAll('.lvl').forEach(b=>b.onclick=()=>setLevel(+b.dataset.l));
  $('#revealAll').onclick=()=>{ const s=slides[order[idx]]; const all=s.beats.every((_,i)=>revealed.has(i));
    revealed.clear(); if(!all) s.beats.forEach((_,i)=>revealed.add(i)); renderBeats(s);
    $('#revealAll').textContent=all?'חשוף הכל':'הסתר הכל'; };

  document.querySelectorAll('#rateRow button').forEach(b=>b.onclick=()=>{ const s=slides[order[idx]];
    ratings[s.n]=(ratings[s.n]===b.dataset.r)?undefined:b.dataset.r; if(!ratings[s.n])delete ratings[s.n];
    localStorage.setItem('aiz_ratings',JSON.stringify(ratings)); render();
    if(ratings[s.n]==='green') setTimeout(next,300); });

  // ---------- timer ----------
  let t0=null,elapsed=0,tick=null,longPressed=false;
  const fmt=ms=>{const x=Math.floor(ms/1000);return String(Math.floor(x/60)).padStart(2,'0')+':'+String(x%60).padStart(2,'0');};
  function updTimer(){ const ms=elapsed+(t0?Date.now()-t0:0);
    $('#timer').innerHTML=fmt(ms)+' <small>/ 10:00</small>';
    $('#timer').style.color=ms>600000?'var(--rose)':(ms>540000?'var(--yellow)':'#fff'); }
  $('#timer').onclick=()=>{ if(longPressed){longPressed=false;return;}
    if(t0){elapsed+=Date.now()-t0;t0=null;clearInterval(tick);}
    else{t0=Date.now();tick=setInterval(updTimer,250);toast('הטיימר רץ — בהצלחה!');} updTimer(); };
  let pt; $('#timer').addEventListener('pointerdown',()=>{pt=setTimeout(()=>{longPressed=true;
    elapsed=0;t0=null;clearInterval(tick);updTimer();toast('הטיימר אופס');},650);});
  $('#timer').addEventListener('pointerup',()=>clearTimeout(pt));
  $('#timer').addEventListener('pointerleave',()=>clearTimeout(pt));

  // ---------- TTS ----------
  let speaking=false;
  function stopTTS(){ if(window.speechSynthesis)speechSynthesis.cancel(); speaking=false; $('#ttsBtn').classList.remove('on'); }
  $('#ttsBtn').onclick=()=>{ if(!('speechSynthesis'in window)){toast('הדפדפן לא תומך בהקראה');return;}
    if(speaking){stopTTS();return;} const s=slides[order[idx]];
    const u=new SpeechSynthesisUtterance(s.beats.join(' ')); u.lang='he-IL'; u.rate=.95;
    const v=speechSynthesis.getVoices().find(v=>/he|iw/i.test(v.lang)); if(v)u.voice=v;
    u.onend=stopTTS; speaking=true; $('#ttsBtn').classList.add('on'); speechSynthesis.speak(u); };
  if(window.speechSynthesis) speechSynthesis.onvoiceschanged=()=>{};

  // ---------- overview / drill ----------
  function buildGrid(){
    const g=$('#grid'); g.innerHTML=''; let cs=-1;
    slides.forEach((s,si)=>{
      if(s.sec!==cs){ cs=s.sec; const h=document.createElement('div'); h.className='gsec';
        const sc=SECTIONS[s.sec]||{move:'',name:''};
        h.innerHTML=(sc.move?sc.move+' · ':'')+(sc.name||'פתיחה')+' <span>('+(s.sec?'סקשן '+s.sec:'preroll')+')</span>';
        g.appendChild(h); }
      const c=document.createElement('div'); c.className='card';
      c.innerHTML='<span class="pill">'+s.n+'</span><span class="rdot '+(ratings[s.n]||'')+'"></span>'+
        '<img src="'+s.img+'" loading="lazy" alt=""><div class="cap">'+s.cue+'</div>';
      c.onclick=()=>{ if(drill)exitDrill(); idx=order.indexOf(si); render(); closeMap(); };
      g.appendChild(c);
    });
  }
  function openMap(){ buildGrid(); $('#overlay').classList.add('show'); }
  function closeMap(){ $('#overlay').classList.remove('show'); }
  $('#mapBtn').onclick=openMap; $('#closeMap').onclick=closeMap;
  function exitDrill(){ drill=false; order=slides.map((_,i)=>i); $('#drillBtn').textContent='🎯 תרגול נקודות תורפה'; }
  $('#drillBtn').onclick=()=>{ if(drill){exitDrill();idx=0;render();closeMap();return;}
    const weak=slides.map((s,i)=>({s,i})).filter(o=>ratings[o.s.n]==='yellow'||ratings[o.s.n]==='red').map(o=>o.i);
    if(!weak.length){toast('אין עדיין שקפים מסומנים 🟡/🔴 — סמני תוך כדי חזרה');return;}
    drill=true; order=weak; idx=0; $('#drillBtn').textContent='↩ חזרה למצב מלא'; render(); closeMap();
    toast('תרגול '+weak.length+' שקפי תורפה'); };

  // ---------- QUIZ ----------
  let qorder=QUIZ.map((_,i)=>i), qi=0, qknown=0, qanswered=0;
  function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
  function quizStart(sh){ qorder=QUIZ.map((_,i)=>i); if(sh)shuffle(qorder); qi=0; qknown=0; qanswered=0; $('#qscore').textContent=''; renderQuiz(); $('#quiz').classList.add('show'); }
  function renderQuiz(){
    const q=QUIZ[qorder[qi]]; const sc=SECTIONS[q.sec]||{move:'',name:''};
    $('#qsec').textContent=(sc.move?sc.move+' · ':'')+sc.name;
    $('#qq').textContent=(qi+1)+'. '+q.q;
    $('#qa').textContent=q.a; $('#qa').classList.remove('show');
    $('#qprog').innerHTML='שאלה <b style="color:#fff">'+(qi+1)+'</b> / '+QUIZ.length+' · ידעתי: '+qknown;
    const a=$('#qactions'); a.innerHTML='';
    const reveal=document.createElement('button'); reveal.className='btn'; reveal.textContent='הצג תשובה 👁';
    reveal.onclick=()=>$('#qa').classList.add('show');
    const know=document.createElement('button'); know.className='navbtn primary'; know.style.flex='1'; know.textContent='🟢 ידעתי';
    know.onclick=()=>grade(true);
    const miss=document.createElement('button'); miss.className='navbtn'; miss.style.flex='1'; miss.textContent='🔴 לא ידעתי';
    miss.onclick=()=>grade(false);
    a.append(reveal,know,miss);
  }
  function grade(ok){ qanswered++; if(ok)qknown++;
    if(qi<QUIZ.length-1){ qi++; renderQuiz(); }
    else { const pct=Math.round(qknown/QUIZ.length*100);
      $('#qsec').textContent=''; $('#qq').textContent='סיימת את המבחן! 🎉';
      $('#qa').classList.add('show'); $('#qa').textContent='ידעת '+qknown+' מתוך '+QUIZ.length+' שאלות.';
      $('#qactions').innerHTML='';
      const again=document.createElement('button'); again.className='navbtn primary'; again.textContent='סבב נוסף 🔁'; again.onclick=()=>quizStart(true);
      $('#qactions').append(again);
      $('#qprog').innerHTML='הושלם';
      $('#qscore').innerHTML='<b>'+pct+'%</b>'+(pct>=85?'מעולה — את שולטת בחומר! 💪':(pct>=60?'כמעט שם — עוד סבב ותהיי חדה.':'שווה עוד כמה סבבים — ואז את שם.')); }
  }
  $('#quizBtn').onclick=()=>quizStart(false);
  $('#closeQuiz').onclick=()=>$('#quiz').classList.remove('show');
  function closeQuiz(){ $('#quiz').classList.remove('show'); }
  $('#qshuffle').onclick=()=>quizStart(true);
  $('#qrestart').onclick=()=>quizStart(false);

  // ---------- help ----------
  $('#helpBtn').onclick=()=>alert(
"איך מתאמנים 👇\n\n"+
"• המבנה: 3 תנועות (WHY · WHAT · HOW) → 7 סקשנים. הפס למעלה מראה איפה את.\n"+
"• 🔗 רצועת זהב = רגע מעבר (תפר). שם משנים הילוך — שווה לעצור עליהם רגע.\n\n"+
"• 4 רמות רמז: מלא ← התחלות ← ראשי תיבות ← בעל פה. תרדי ברמה ככל שזוכרת יותר.\n"+
"• לחיצה על שורה חושפת/מסתירה אותה — גם במצב מבחן.\n"+
"• דרגי כל שקף: 🟢/🟡/🔴 (נשמר). ▦ = מפת המסע + 🎯 תרגול נקודות תורפה.\n"+
"• 📝 מבחן ידע = שאלות שבודקות שאת שולטת בתוכן, לא רק בניסוח.\n"+
"• טיימר: לחיצה=הפעלה/עצירה, לחיצה ארוכה=איפוס. יעד 10:00.\n\n"+
"מקלדת: ← הבא · → הקודם · רווח=חשיפת השורה הבאה · 1–4=רמת רמז.");

  // ---------- edit controls ----------
  $('#editBtn').onclick=()=>{ editing=!editing; document.body.classList.toggle('editing',editing);
    $('#editBtn').classList.toggle('on',editing); render(); if(editing)toast('מצב עריכה — השינויים נשמרים אוטומטית'); };
  $('#edCue').oninput=()=>{ const s=slides[order[idx]]; s.cue=$('#edCue').value; saveEdit(s); $('#cueline').textContent='⟡ '+s.cue; };
  $('#edTurn').oninput=()=>{ const s=slides[order[idx]]; s.turn=$('#edTurn').value.trim(); saveEdit(s); };
  $('#edAddLine').onclick=()=>{ const s=slides[order[idx]]; s.beats.push(''); saveEdit(s); render();
    const tas=document.querySelectorAll('#beats textarea'); if(tas.length)tas[tas.length-1].focus(); };
  $('#edReset').onclick=()=>{ const s=slides[order[idx]]; const o=ORIGINAL.find(x=>x.n===s.n);
    s.beats=o.beats.slice(); s.cue=o.cue; s.turn=o.turn; delete edits[s.n];
    localStorage.setItem('aiz_edits',JSON.stringify(edits)); render(); toast('השקף שוחזר לנוסח המקורי'); };
  $('#edExport').onclick=()=>{ let out='חדר חזרות · Ai-Z — טקסטים\n\n';
    slides.forEach(s=>{ out+='### שקף '+s.n+' — '+s.cue+'\n'; if(s.turn)out+='[מעבר] '+s.turn+'\n';
      s.beats.forEach(b=>{ out+=b+'\n'; }); out+='\n'; });
    const blob=new Blob([out],{type:'text/plain;charset=utf-8'}); const a=document.createElement('a');
    a.href=URL.createObjectURL(blob); a.download='Ai-Z-texts.txt'; document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(a.href); toast('הקובץ ירד 📄'); };

  idx=order.findIndex(i=>slides[i].spoken); if(idx<0)idx=0;
  setLevel(1); render();
})();
</script>
</body>
</html>
